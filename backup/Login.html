<style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap');

    .gamified-login-wrapper {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #0f172a;
        background-image: 
            radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
            radial-gradient(at 50% 0%, hsla(225,39%,30%,0.5) 0, transparent 50%), 
            radial-gradient(at 100% 0%, hsla(339,49%,30%,0.5) 0, transparent 50%);
        position: relative;
        padding: 20px;
    }

    .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(60px);
        opacity: 0.6;
        animation: float 10s infinite ease-in-out alternate;
    }
    .orb-1 { width: 300px; height: 300px; background: #3b82f6; top: -50px; left: -50px; }
    .orb-2 { width: 400px; height: 400px; background: #8b5cf6; bottom: -100px; right: -100px; animation-delay: -5s; }

    @keyframes float {
        0% { transform: translate(0, 0) scale(1); }
        100% { transform: translate(30px, 50px) scale(1.1); }
    }

    .glass-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        border-radius: 24px;
        width: 100%;
        max-width: 420px;
        padding: 40px 30px;
        position: relative;
        z-index: 10;
        text-align: center;
    }

    .mascot-ring {
        width: 110px;
        height: 110px;
        margin: 0 auto 20px;
        border-radius: 50%;
        padding: 4px;
        background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
        position: relative;
        box-shadow: 0 0 20px rgba(79, 172, 254, 0.4);
    }
    .mascot-inner {
        width: 100%;
        height: 100%;
        background-color: #1e293b;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .mascot-ring i {
        font-size: 2.5rem;
        color: #4facfe;
    }
    .developer-tag {
        position: absolute;
        bottom: -12px;
        left: 50%;
        transform: translateX(-50%);
        background: #f59e0b;
        color: #111827;
        font-size: 0.7rem;
        font-weight: 700;
        padding: 4px 14px;
        border-radius: 20px;
        white-space: nowrap;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .game-title {
        font-family: 'Orbitron', sans-serif;
        color: #ffffff;
        font-size: 1.8rem;
        font-weight: 700;
        margin-bottom: 5px;
        text-shadow: 0 0 10px rgba(255,255,255,0.3);
        letter-spacing: 2px;
    }
    .game-subtitle {
        color: #94a3b8;
        font-size: 0.9rem;
        margin-bottom: 30px;
        letter-spacing: 1px;
    }

    .custom-input-group {
        position: relative;
        margin-bottom: 25px;
        text-align: left;
    }
    .custom-input-group i {
        position: absolute;
        top: 50%;
        left: 15px;
        transform: translateY(-50%);
        color: #64748b;
        font-size: 1.1rem;
        transition: 0.3s;
    }
    .custom-input {
        width: 100%;
        background: rgba(15, 23, 42, 0.6);
        border: 2px solid rgba(255, 255, 255, 0.05);
        border-radius: 12px;
        padding: 14px 15px 14px 45px;
        color: #fff;
        font-size: 1rem;
        outline: none;
        transition: all 0.3s ease;
    }
    .custom-input::placeholder { color: #475569; }
    .custom-input:focus {
        border-color: #3b82f6;
        box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        background: rgba(15, 23, 42, 0.8);
    }
    .custom-input:focus + i, .custom-input:valid + i { color: #3b82f6; }

    .btn-neon {
        background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
        color: white;
        border: none;
        width: 100%;
        padding: 15px;
        border-radius: 12px;
        font-size: 1.1rem;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.3s ease;
    }
    .btn-neon:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 25px rgba(139, 92, 246, 0.5);
    }
</style>

<div class="gamified-login-wrapper">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="glass-card">
        <div class="mascot-ring">
            <div class="mascot-inner">
                <i class="fas fa-robot"></i>
            </div>
            <div class="developer-tag">Chafid Nur, S.Kom</div>
        </div>

        <h1 class="game-title">DUTA KARYA</h1>
        <p class="game-subtitle">TYPING CHALLENGE V1.0</p>

        <form id="formLogin">
            <div class="custom-input-group">
                <input type="text" id="username" class="custom-input" placeholder="Username" required>
                <i class="fas fa-user-ninja"></i>
            </div>
            <div class="custom-input-group">
                <input type="password" id="password" class="custom-input" placeholder="Password" required>
                <i class="fas fa-key"></i>
            </div>
            <button type="submit" id="btnLogin" class="btn-neon">
                <span id="loginSpinner" class="spinner-border spinner-border-sm d-none me-2" role="status"></span>
                <span id="btnText">START GAME</span>
            </button>
        </form>
        <div class="mt-4 text-center">
            <a href="#" id="btnLupaPassword" class="text-secondary" style="text-decoration: none; font-size: 0.9rem; transition: color 0.3s;">
                <i class="fas fa-question-circle me-1"></i> Akses Ditolak / Lupa Password?
            </a>
        </div>
    </div>
</div>

<script>
$(document).ready(function() {
    $('#formLogin').on('submit', function(e) {
        e.preventDefault();
        
        const username = $('#username').val();
        const password = $('#password').val();
        
        $('#btnLogin').attr('disabled', true);
        $('#loginSpinner').removeClass('d-none');
        $('#btnText').text('CONNECTING...');

        google.script.run
            .withSuccessHandler(function(response) {
                $('#btnLogin').removeAttr('disabled');
                $('#loginSpinner').addClass('d-none');
                $('#btnText').text('START GAME');

                if (response.status === 'success') {
                    Swal.fire({
                        icon: 'success',
                        title: 'ACCESS GRANTED',
                        text: 'Welcome Player: ' + response.nama,
                        background: '#1e293b',
                        color: '#fff',
                        showConfirmButton: false,
                        timer: 1500
                    }).then(() => {
                        localStorage.setItem('kd_user', response.kd_user);
                        localStorage.setItem('nama_user', response.nama);
                        localStorage.setItem('role_user', response.role);
                        // Ini akan memanggil Utils.html untuk pindah halaman
                        loadPage('Dashboard');
                    });
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'ACCESS DENIED',
                        text: response.message,
                        background: '#1e293b',
                        color: '#fff',
                        confirmButtonColor: '#ef4444'
                    });
                }
            })
            .withFailureHandler(function(err) {
                $('#btnLogin').removeAttr('disabled');
                $('#loginSpinner').addClass('d-none');
                $('#btnText').text('START GAME');
                Swal.fire({
                    icon: 'error',
                    title: 'SERVER ERROR',
                    text: 'Gagal terhubung ke database server.',
                    background: '#1e293b',
                    color: '#fff'
                });
            })
            .prosesLogin(username, password);
    });
    $('#btnLupaPassword').on('click', function(e) {
        e.preventDefault();
        Swal.fire({
            icon: 'info',
            title: 'SISTEM TERKUNCI',
            html: `Tidak bisa masuk? Lupa password?<br><br>Silakan temui <b>Bapak Chafid Nur, S.Kom.</b> secara langsung untuk melakukan sinkronisasi ulang dan reset password akun Anda.`,
            background: '#1e293b',
            color: '#fff',
            confirmButtonColor: '#3b82f6',
            confirmButtonText: 'MENGERTI'
        });
    });
});
</script>
