<script>
  /**
   * Fungsi Utama Navigasi SPA (Client-Side)
   * Bertugas mengganti konten layar secara dinamis tanpa reload browser
   */
  function loadPage(pageName) {
    // 1. Tampilkan layar loading dengan tema gelap
    $('#app-content').html(`
      <div class="d-flex flex-column justify-content-center align-items-center" style="min-height: 100vh; background-color: #0f172a;">
        <div class="spinner-border text-primary" style="width: 4rem; height: 4rem; border-width: 0.25em;" role="status"></div>
        <h4 class="mt-4 text-white fw-bold" style="font-family: 'Orbitron', sans-serif; letter-spacing: 2px;">MEMUAT SISTEM...</h4>
      </div>
    `);

    // 2. Minta file HTML dari backend menggunakan penamaan path Clasp MVC
    google.script.run
      .withSuccessHandler(function(htmlContent) {
        // Jika sukses, timpa layar loading dengan komponen halaman baru
        $('#app-content').html(htmlContent);
      })
      .withFailureHandler(function(err) {
        // Jika gagal/error, tampilkan peringatan
        Swal.fire({
          icon: 'error',
          title: 'SYSTEM ERROR',
          text: 'Gagal memuat halaman: ' + err.message,
          background: '#1e293b',
          color: '#fff',
          confirmButtonColor: '#ef4444'
        });
      })
      .getHtmlTemplate('resources/views/pages/' + pageName); 
  }
</script>
