<style>
    .leaderboard-wrapper { padding: 40px 20px; max-width: 900px; margin: 0 auto; min-height: 100vh; color: #fff; }
    .gold-panel {
        background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(245, 158, 11, 0.2);
        border-radius: 20px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    
    .rank-row {
        background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(255,255,255,0.02);
        border-radius: 12px; padding: 15px 20px; margin-bottom: 12px; transition: all 0.2s;
    }
    .rank-row:hover { transform: scale(1.01); background: rgba(245, 158, 11, 0.05); border-color: rgba(245, 158, 11, 0.3); }
    
    /* Efek Kosmetik untuk Podium Tiga Besar */
    .podium-1 { background: linear-gradient(90deg, rgba(245,158,11,0.15) 0%, rgba(15,23,42,0.6) 100%); border-color: rgba(245, 158, 11, 0.4); }
    .podium-2 { background: linear-gradient(90deg, rgba(148,163,184,0.15) 0%, rgba(15,23,42,0.6) 100%); border-color: rgba(148,163,184,0.4); }
    .podium-3 { background: linear-gradient(90deg, rgba(180,83,9,0.15) 0%, rgba(15,23,42,0.6) 100%); border-color: rgba(180,83,9,0.4); }
    
    .rank-number { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; font-weight: 700; width: 40px; }
    .stat-wpm-display { font-family: 'Orbitron', sans-serif; font-size: 1.6rem; font-weight: 700; color: #f59e0b; }
</style>

<div class="leaderboard-wrapper">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-0" style="font-family: 'Orbitron', sans-serif; letter-spacing: 2px; color: #f59e0b;">
                <i class="fas fa-trophy me-2"></i> HALL OF FAME
            </h2>
            <p class="text-secondary mb-0">Daftar 10 Besar Pengetik Tercepat SMK Duta Karya Kudus</p>
        </div>
        <button class="btn btn-outline-secondary rounded-pill fw-bold px-4" onclick="loadPage('Dashboard')">
            <i class="fas fa-arrow-left me-2"></i> KEMBALI
        </button>
    </div>

    <div class="gold-panel">
        <div id="loadingLeaderboard" class="text-center py-5">
            <div class="spinner-border text-warning" role="status"></div>
            <div class="text-secondary mt-2">Membaca rekor kecepatan tersimpan...</div>
        </div>

        <div id="containerListPeringkat" class="d-none">
            </div>
    </div>
</div>

<script>
    (function initHallOfFame() {
        google.script.run
            .withSuccessHandler(function(listData) {
                $('#loadingLeaderboard').addClass('d-none');
                let container = $('#containerListPeringkat').removeClass('d-none');
                container.empty();

                if(listData.length === 0) {
                    container.html('<div class="text-center text-secondary py-4">Belum ada rekor skor yang tercatat di server.</div>');
                    return;
                }

                listData.forEach((row, index) => {
                    let nomorPeringkat = index + 1;
                    let kelasTambahan = "";
                    let pialaIcon = `${nomorPeringkat}`;

                    // Setel kosmetik khusus untuk juara podium
                    if(nomorPeringkat === 1) { kelasTambahan = "podium-1"; pialaIcon = "👑"; }
                    else if(nomorPeringkat === 2) { kelasTambahan = "podium-2"; pialaIcon = "🥈"; }
                    else if(nomorPeringkat === 3) { kelasTambahan = "podium-3"; pialaIcon = "🥉"; }

                    let itemHtml = `
                        <div class="rank-row d-flex align-items-center justify-content-between ${kelasTambahan}">
                            <div class="d-flex align-items-center">
                                <div class="rank-number text-center me-3">${pialaIcon}</div>
                                <div>
                                    <h5 class="fw-bold mb-0 text-white">${row.nama}</h5>
                                    <small class="text-secondary">${row.kelas} • <span class="text-info">${row.gelar}</span></small>
                                </div>
                            </div>
                            <div class="text-end">
                                <span class="stat-wpm-display">${row.wpm}</span>
                                <div class="text-secondary" style="font-size: 0.75rem;">WPM / ${row.accuracy}% ACC</div>
                            </div>
                        </div>
                    `;
                    container.append(itemHtml);
                });
            })
            .getHallOfFameData();
    })();
</script>
