<style>
    .leaderboard-wrapper { padding: 40px 20px; max-width: 900px; margin: 0 auto; min-height: 100vh; color: #fff; position: relative; }
    
    /* Efek Kembang Api Animasi */
    .fireworks-bg {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
        background: radial-gradient(circle, rgba(251,191,36,0.15) 1px, transparent 1px);
        background-size: 80px 80px; z-index: 0; animation: twinkle 3s infinite;
    }
    @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.5; } }

    .gold-panel {
        background: rgba(30, 41, 59, 0.9); border: 1px solid rgba(245, 158, 11, 0.3);
        border-radius: 20px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        position: relative; z-index: 1;
    }
    .rank-card {
        background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255,255,255,0.1);
        border-radius: 15px; padding: 15px; margin-bottom: 15px; display: flex; align-items: center;
    }
    .rank-avatar { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; border: 2px solid #3b82f6; }
    .rank-stats { text-align: right; font-family: 'Orbitron', sans-serif; }
</style>

<div class="fireworks-bg"></div>

<div class="leaderboard-wrapper">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <div>
            <h2 class="fw-bold" style="font-family: 'Orbitron', sans-serif; letter-spacing: 2px;">
                <i class="fas fa-trophy text-warning me-2"></i> HALL OF FAME
            </h2>
            <p class="text-secondary mb-0">Legenda SMK Duta Karya Kudus</p>
        </div>
        <button class="btn btn-outline-secondary rounded-pill fw-bold px-4" onclick="loadPage('Dashboard')">
            <i class="fas fa-arrow-left me-2"></i> KEMBALI
        </button>
    </div>

    <div class="gold-panel" id="leaderboardContainer">
        <div class="text-center py-5"><div class="spinner-border text-warning"></div></div>
    </div>
</div>

<script>
// PROTEKSI: Jika user tidak login, usir ke halaman login
(function() {
    if (!localStorage.getItem('kd_user')) {
        localStorage.clear();
        loadPage('Login');
    }
})();

$(document).ready(function() {
    google.script.run.withSuccessHandler(function(players) {
        let html = "";
        players.forEach((p, index) => {
            let rankClass = index < 3 ? `border border-warning` : '';
            let medal = index === 0 ? '👑' : (index === 1 ? '🥈' : (index === 2 ? '🥉' : `#${index+1}`));
            
            html += `
            <div class="rank-card ${rankClass}">
                <div class="fw-bold fs-3 text-secondary" style="width: 60px; text-align: center;">${medal}</div>
                <img src="${p.avatar}" class="rank-avatar" onerror="this.src='https://api.dicebear.com/7.x/bottts/svg?seed=${p.nama}'">
                <div class="ms-3 flex-grow-1">
                    <h5 class="mb-0 fw-bold text-white">${p.nama}</h5>
                    <small class="text-info">${p.kelas} • <span class="text-secondary">${p.username}</span></small><br>
                    <span class="badge bg-warning text-dark mt-1">${p.gelar || 'Trainee'}</span>
                </div>
                <div class="rank-stats">
                    <div class="fs-4 fw-bold text-info">${p.wpm} <small class="fs-6 text-secondary">WPM</small></div>
                    <div class="text-success small">Acc: ${p.acc || p.accuracy}%</div>
                </div>
            </div>`;
        });
        $('#leaderboardContainer').html(html);
    }).getHallOfFameData();
});
</script>
