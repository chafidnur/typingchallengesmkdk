<style>
    .leaderboard-wrapper { padding: 40px 20px; max-width: 900px; margin: 0 auto; min-height: 100vh; color: #fff; position: relative; }
    
    /* Efek Kembang Api Background */
    .fireworks-bg {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
        background-image: radial-gradient(circle, #f59e0b 1px, transparent 1px), radial-gradient(circle, #3b82f6 1px, transparent 1px);
        background-size: 50px 50px; opacity: 0.1; /* Opacity tipis agar data tetap terbaca */
        z-index: 0;
    }

    .gold-panel {
        background: rgba(30, 41, 59, 0.85); border: 1px solid rgba(245, 158, 11, 0.2);
        border-radius: 20px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        position: relative; z-index: 1;
    }
    
    .rank-card {
        background: rgba(15, 23, 42, 0.7); border: 1px solid rgba(255,255,255,0.05);
        border-radius: 15px; padding: 15px; margin-bottom: 15px; display: flex; align-items: center;
        transition: transform 0.2s;
    }
    .rank-avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid #3b82f6; }
    .rank-stats { text-align: right; font-family: 'Orbitron', sans-serif; }
</style>

<div class="fireworks-bg"></div> <div class="leaderboard-wrapper">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <div>
            <h2 class="fw-bold" style="font-family: 'Orbitron', sans-serif; letter-spacing: 2px;">
                <i class="fas fa-trophy text-warning me-2"></i> HALL OF FAME
            </h2>
            <p class="text-secondary mb-0">Legenda SMK Duta Karya Kudus</p>
        </div>
        <button class="btn btn-outline-secondary rounded-pill fw-bold px-4" onclick="loadPage('Dashboard')">
            <i class="fas fa-arrow-left me-2"></i> KEMBALI
        </button>
    </div>

    <div class="gold-panel" id="leaderboardContainer">
        </div>
</div>

<script>
$(document).ready(function() {
    google.script.run.withSuccessHandler(function(data) {
        let html = "";
        data.forEach((p, index) => {
            let rankClass = index < 3 ? `border-warning` : '';
            let avatarSrc = p.avatar || 'https://api.dicebear.com/7.x/bottts/svg?seed=' + p.nama;
            
            html += `
            <div class="rank-card ${rankClass}">
                <div class="fw-bold fs-3 text-secondary" style="width: 50px;">#${index+1}</div>
                <img src="${avatarSrc}" class="rank-avatar" onerror="this.src='https://api.dicebear.com/7.x/bottts/svg?seed=${p.nama}'">
                <div class="ms-3 flex-grow-1">
                    <h5 class="mb-0 fw-bold">${p.nama} ${index === 0 ? '👑' : ''}</h5>
                    <small class="text-info">${p.kelas} | ${p.tahun_ajaran}</small><br>
                    <span class="badge bg-warning text-dark">${p.gelar}</span>
                </div>
                <div class="rank-stats">
                    <div class="fs-4 fw-bold text-info">${p.wpm} <small class="fs-6">WPM</small></div>
                </div>
            </div>`;
        });
        $('#leaderboardContainer').html(html);
    }).getHallOfFameData();
});
</script>
