<style>
    .leaderboard-wrapper {
        padding: 40px 20px;
        max-width: 900px;
        margin: 0 auto;
        min-height: 100vh;
        color: #fff;
    }
    .rank-card {
        background: rgba(30, 41, 59, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 15px;
        padding: 15px 25px;
        margin-bottom: 15px;
        display: flex;
        align-items: center;
        transition: transform 0.3s;
    }
    .rank-card:hover {
        transform: scale(1.02);
        background: rgba(59, 130, 246, 0.1);
        border-color: rgba(59, 130, 246, 0.3);
    }
    .rank-number {
        font-family: 'Orbitron', sans-serif;
        font-size: 2rem;
        font-weight: bold;
        width: 60px;
        text-align: center;
        color: #64748b;
    }
    .rank-1 .rank-number { color: #fbbf24; text-shadow: 0 0 15px rgba(251, 191, 36, 0.6); } /* Emas */
    .rank-2 .rank-number { color: #94a3b8; text-shadow: 0 0 15px rgba(148, 163, 184, 0.6); } /* Perak */
    .rank-3 .rank-number { color: #b45309; text-shadow: 0 0 15px rgba(180, 83, 9, 0.6); } /* Perunggu */
    
    .rank-details { flex-grow: 1; padding-left: 20px; }
    .rank-stats { text-align: right; font-family: 'Orbitron', sans-serif; }
</style>

<div class="leaderboard-wrapper">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <div>
            <h2 class="fw-bold" style="font-family: 'Orbitron', sans-serif; letter-spacing: 2px;">
                <i class="fas fa-trophy text-warning me-2"></i> HALL OF FAME
            </h2>
            <p class="text-secondary mb-0">Top 10 Typist Tercepat Sekolah</p>
        </div>
        <button class="btn btn-outline-secondary rounded-pill" onclick="loadPage('Dashboard')">
            <i class="fas fa-arrow-left me-2"></i> KEMBALI
        </button>
    </div>

    <div id="leaderboardContainer">
        <!-- Tampilan Loading -->
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-3 text-secondary">Menarik data dari server utama...</p>
        </div>
    </div>
</div>

<script>
$(document).ready(function() {
    // Meminta data klasemen dari backend
    google.script.run
        .withSuccessHandler(function(players) {
            let html = "";
            
            if(players.length === 0) {
                html = `<div class="alert alert-dark text-center border-secondary">Belum ada data permainan yang terekam.</div>`;
            } else {
                players.forEach((p, index) => {
                    let rankClass = index < 3 ? `rank-${index + 1}` : '';
                    let trophyIcon = index === 0 ? `<i class="fas fa-crown text-warning me-2"></i>` : '';
                    
                    html += `
                    <div class="rank-card ${rankClass}">
                        <div class="rank-number">#${index + 1}</div>
                        <div class="rank-details">
                            <h4 class="mb-0 fw-bold">${trophyIcon}${p.nama}</h4>
                            <span class="badge bg-primary rounded-pill mt-1">Level ${p.level}</span>
                        </div>
                        <div class="rank-stats">
                            <div class="fs-4 fw-bold text-info">${p.wpm} <span class="fs-6 text-secondary">WPM</span></div>
                            <div class="text-success small">Acc: ${p.acc}%</div>
                        </div>
                    </div>`;
                });
            }
            $('#leaderboardContainer').html(html);
        })
        .withFailureHandler(function(err) {
            $('#leaderboardContainer').html(`<div class="alert alert-danger text-center">Gagal memuat data klasemen: ${err.message}</div>`);
        })
        .getLeaderboard();
});
</script>
