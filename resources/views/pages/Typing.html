<style>
    /* Styling Arena Mengetik Premium Glassmorphism */
    .typing-wrapper {
        padding: 40px 20px;
        max-width: 900px;
        margin: 0 auto;
        min-height: 100vh;
        color: #fff;
    }
    .game-card {
        background: rgba(30, 41, 59, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        position: relative;
    }
    .word-box {
        background: rgba(15, 23, 42, 0.6);
        border: 2px solid rgba(255, 255, 255, 0.05);
        border-radius: 15px;
        padding: 25px;
        font-size: 1.6rem;
        line-height: 2.5rem;
        letter-spacing: 1.5px;
        
        /* FITUR BARU: Membatasi area teks & menyembunyikan scrollbar */
        height: 155px; /* Pas untuk 3 baris */
        overflow: hidden; 
        scroll-behavior: smooth; /* Efek gulir otomatis yang lembut */
        
        margin-bottom: 25px;
        user-select: none;
        text-align: left;
        position: relative;
        font-family: 'Consolas', 'Courier New', monospace; 
    }

    /* Modifikasi Indikator Huruf ala 10FastFingers */
    #wordBoxContainer span {
        border-radius: 4px;
        padding: 0 2px;
        transition: background-color 0.1s;
    }
    .char-current {
        background-color: rgba(59, 130, 246, 0.4);
        color: #fff;
        border-bottom: 3px solid #3b82f6; 
    }
    .char-correct { color: #10b981; }
    .char-incorrect { background-color: rgba(239, 68, 68, 0.5); color: #fff; }

    /* Input Tersembunyi (Invisible) */
    .input-hidden {
        position: absolute;
        top: 0;
        left: 0;
        opacity: 0; 
        z-index: -1;
        width: 10px;
        height: 10px;
    }

    /* Notifikasi overlay saat arena di-klik */
    .focus-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(4px);
        border-radius: 15px;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 10;
        cursor: pointer;
        transition: opacity 0.3s ease;
    }
    .focus-overlay h4 { margin: 0; font-family: 'Orbitron', sans-serif; color: #3b82f6; letter-spacing: 2px;}
    
    .arena-focused .focus-overlay {
        opacity: 0;
        pointer-events: none;
    }
    
    .live-stat {
        font-family: 'Orbitron', sans-serif;
        font-size: 1.8rem;
        font-weight: 700;
    }
</style>

<div class="typing-wrapper">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-0" style="font-family: 'Orbitron', sans-serif; letter-spacing: 2px;">
                <i class="fas fa-keyboard text-info me-2"></i> TRAINING ARENA
            </h2>
            <p class="text-secondary mb-0">Asah kecepatan dan memori otot jarimu</p>
        </div>
        <div class="d-flex">
            <button class="btn btn-outline-info rounded-pill fw-bold px-3 me-2" id="btnToggleSound" onclick="toggleSound()">
                <i class="fas fa-volume-up me-2"></i> SOUND ON
            </button>
            <button class="btn btn-outline-secondary rounded-pill fw-bold px-3" onclick="loadPage('Dashboard')">
                <i class="fas fa-arrow-left me-2"></i> KEMBALI
            </button>
        </div>
    </div>

    <!-- Papan Skor Live -->
    <div class="row g-3 mb-4 text-center">
        <div class="col-4">
            <div class="bg-dark border border-secondary rounded-3 p-3">
                <div class="text-secondary small fw-bold">WAKTU</div>
                <div class="live-stat text-warning" id="liveTimer">60<span class="fs-6 text-secondary">s</span></div>
            </div>
        </div>
        <div class="col-4">
            <div class="bg-dark border border-secondary rounded-3 p-3">
                <div class="text-secondary small fw-bold">SPEED</div>
                <div class="live-stat text-info" id="liveWpm">0 <span class="fs-6 text-secondary">WPM</span></div>
            </div>
        </div>
        <div class="col-4">
            <div class="bg-dark border border-secondary rounded-3 p-3">
                <div class="text-secondary small fw-bold">AKURASI</div>
                <div class="live-stat text-success" id="liveAcc">100<span class="fs-6 text-secondary">%</span></div>
            </div>
        </div>
    </div>

    <!-- Game Card Utama -->
    <div class="game-card">
        <div class="word-box" id="typingAreaWrapper" onclick="focusInputField()">
            <div class="focus-overlay" id="focusOverlay">
                <h4><i class="fas fa-mouse-pointer me-2"></i>KLIK DI SINI UNTUK MULAI</h4>
            </div>
            
            <div id="wordBoxContainer">
                <!-- Kalimat dirender karakter per karakter di sini -->
            </div>
        </div>

        <input type="text" id="hiddenInputField" class="input-hidden" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        
        <div class="text-center mt-3">
            <button class="btn btn-sm btn-outline-warning rounded-pill" onclick="resetGame()">
                <i class="fas fa-sync-alt me-1"></i> Ulangi (F5)
            </button>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // DEKLARASI VARIABEL GLOBAL
    // ==========================================
    var targetText = "Keterampilan mengetik sepuluh jari dengan cepat dan akurat adalah modal utama yang wajib dimiliki oleh setiap lulusan SMK Duta Karya Kudus di era digital. Saat kalian memasuki dunia kerja profesional, baik di sektor pelayanan kesehatan, industri kimia, maupun manajemen perhotelan, ketelitian adalah kunci keberhasilan yang mutlak. Kesalahan ketik atau typo tidak boleh dianggap remeh, mulai dari pengisian rekam medis pasien, takaran dosis obat, laporan analisis laboratorium, formula bahan industri, hingga input data registrasi tamu dan administrasi penting lainnya. Setiap angka dan huruf yang kalian ketik di layar komputer mencerminkan profesionalisme dan tanggung jawab kalian di tempat kerja. Oleh karena itu, belajarlah untuk selalu fokus dan biasakan jari-jemari kalian mengetik di atas keyboard dengan tingkat presisi yang tinggi. Disiplin berlatih hari ini akan membentuk kalian menjadi tenaga kerja yang cerdas, cekatan, dan siap diandalkan di dunia industri masa depan.";
    var timeRemaining = 60;
    var timerInterval = null;
    var isPlaying = false;
    
    var charIndex = 0;           
    var kesalahanTotal = 0;      
    var arrayStatusKetik = [];   

    // AUDIO CONFIGURATION
    var isSoundEnabled = true;
    var soundClick = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3'); 
    var soundError = new Audio('https://assets.mixkit.co/active_storage/sfx/2570/2570-preview.mp3'); 
    soundClick.volume = 0.6; soundError.volume = 0.4;

    function toggleSound() {
        isSoundEnabled = !isSoundEnabled;
        let btn = document.getElementById('btnToggleSound');
        if(isSoundEnabled) {
            btn.innerHTML = '<i class="fas fa-volume-up me-2"></i> SOUND ON';
            btn.classList.replace('btn-outline-secondary', 'btn-outline-info');
        } else {
            btn.innerHTML = '<i class="fas fa-volume-mute me-2"></i> SOUND OFF';
            btn.classList.replace('btn-outline-info', 'btn-outline-secondary');
        }
    }

    function playTypeSound(isTypo = false) {
        if (!isSoundEnabled) return;
        if (isTypo) {
            soundError.currentTime = 0; soundError.play().catch(e => {});
        } else {
            soundClick.currentTime = 0; soundClick.play().catch(e => {});
        }
    }

    // ==========================================
    // LOGIKA PERMAINAN (GAME ENGINE)
    // ==========================================
    function focusInputField() {
        $('#hiddenInputField').focus();
    }

    // FITUR AUTO SCROLL: Menjaga Kursor Tetap di Tengah Teks
    function prosesAutoScroll(spanElement) {
        if (!spanElement) return;
        let wrapper = document.getElementById('typingAreaWrapper');
        // Mendapatkan posisi Y huruf saat ini relatif terhadap container (dikurangi padding container 25px)
        let posisiY = spanElement.offsetTop - 25; 
        
        // Jika kursor sudah masuk ke baris kedua/ketiga (melebihi 40px), gulir layarnya ke bawah
        if (posisiY > 40) {
            wrapper.scrollTop = posisiY - 40; 
        } else {
            wrapper.scrollTop = 0; // Kembalikan ke paling atas
        }
    }

    function renderTeksMulai() {
        let container = $('#wordBoxContainer');
        container.empty();
        arrayStatusKetik = new Array(targetText.length).fill(null);
        
        targetText.split('').forEach((char, index) => {
            let span = $('<span>').text(char);
            if(index === 0) span.addClass('char-current');
            container.append(span);
        });
    }

    function resetGame() {
        clearInterval(timerInterval);
        timeRemaining = 60;
        charIndex = 0;
        kesalahanTotal = 0;
        isPlaying = false;
        
        $('#liveTimer').html('60<span class="fs-6 text-secondary">s</span>');
        $('#liveWpm').html('0 <span class="fs-6 text-secondary">WPM</span>');
        $('#liveAcc').html('100<span class="fs-6 text-secondary">%</span>');
        
        $('#hiddenInputField').val('');
        $('#hiddenInputField').prop('disabled', false);
        
        $('#typingAreaWrapper').removeClass('arena-focused');
        $('#typingAreaWrapper')[0].scrollTop = 0; // Kembalikan scroll ke paling atas
        
        renderTeksMulai();
    }

    function startTimer() {
        isPlaying = true;
        timerInterval = setInterval(function() {
            timeRemaining--;
            $('#liveTimer').html(timeRemaining + '<span class="fs-6 text-secondary">s</span>');
            
            hitungWpmLive();

            if (timeRemaining <= 0) {
                endGameSession();
            }
        }, 1000);
    }

    function hitungWpmLive() {
        let waktuBerjalan = 60 - timeRemaining;
        if(waktuBerjalan <= 0) return;
        
        let totalBenar = arrayStatusKetik.filter(status => status === 1).length;
        let wpm = Math.round((totalBenar / 5) / (waktuBerjalan / 60));
        $('#liveWpm').html(wpm + ' <span class="fs-6 text-secondary">WPM</span>');
    }

    function hitungAkurasiLive() {
        let totalBenar = arrayStatusKetik.filter(status => status === 1).length;
        let totalSalah = arrayStatusKetik.filter(status => status === 0).length;
        let totalDiketik = totalBenar + totalSalah;
        
        if (totalDiketik === 0) return 100;
        let acc = Math.round((totalBenar / totalDiketik) * 100);
        return acc;
    }

    function endGameSession() {
        clearInterval(timerInterval);
        $('#hiddenInputField').prop('disabled', true);
        
        let akurasiFinal = hitungAkurasiLive();
        let totalBenar = arrayStatusKetik.filter(status => status === 1).length;
        let wpmFinal = Math.round((totalBenar / 5) / (1)); 

        Swal.fire({
            title: 'SESI SELESAI!',
            html: `<b>Kecepatan:</b> <span class="text-info">${wpmFinal} WPM</span><br><b>Akurasi:</b> <span class="text-success">${akurasiFinal}%</span><br><b>Typo:</b> <span class="text-danger">${kesalahanTotal}x</span>`,
            icon: 'success',
            background: '#1e293b',
            color: '#fff',
            confirmButtonColor: '#3b82f6',
            confirmButtonText: 'KEMBALI KE DASHBOARD'
        }).then(() => {
            loadPage('Dashboard');
        });
    }

    // ==========================================
    // INTERAKSI REALTIME
    // ==========================================
    (function initGameArena() {
        renderTeksMulai();

        $('#hiddenInputField').on('focus', function() {
            $('#typingAreaWrapper').addClass('arena-focused');
        });
        $('#hiddenInputField').on('blur', function() {
            if(!isPlaying) $('#typingAreaWrapper').removeClass('arena-focused');
        });

        $('#hiddenInputField').on('paste', function(e) {
            e.preventDefault();
            return false;
        });

        $('#hiddenInputField').on('keydown', function(e) {
            let allSpans = $('#wordBoxContainer span');
            
            if (e.key === 'Shift' || e.key === 'Control' || e.key === 'Alt' || e.key === 'Meta' || e.key === 'CapsLock') return;
            
            // LOGIKA BACKSPACE
            if (e.key === 'Backspace') {
                if (charIndex > 0) {
                    charIndex--; 
                    
                    $(allSpans[charIndex]).removeClass('char-correct char-incorrect char-current');
                    if (charIndex + 1 < targetText.length) {
                        $(allSpans[charIndex + 1]).removeClass('char-current');
                    }
                    $(allSpans[charIndex]).addClass('char-current');
                    arrayStatusKetik[charIndex] = null;
                    
                    playTypeSound(false); 
                    prosesAutoScroll(allSpans[charIndex]); // Auto Scroll Mundur
                }
                return; 
            }

            // LOGIKA KETIK MAJU
            if (charIndex < targetText.length) {
                if (!isPlaying) startTimer();

                let targetChar = targetText.charAt(charIndex);
                let userChar = e.key;

                if (userChar === targetChar) {
                    $(allSpans[charIndex]).removeClass('char-current').addClass('char-correct');
                    arrayStatusKetik[charIndex] = 1; 
                    playTypeSound(false);
                } else {
                    $(allSpans[charIndex]).removeClass('char-current').addClass('char-incorrect');
                    arrayStatusKetik[charIndex] = 0; 
                    kesalahanTotal++; 
                    playTypeSound(true);
                }

                charIndex++; 

                if (charIndex < targetText.length) {
                    let nextSpan = allSpans[charIndex];
                    $(nextSpan).addClass('char-current');
                    prosesAutoScroll(nextSpan); // Auto Scroll Maju
                }

                $('#liveAcc').html(hitungAkurasiLive() + '<span class="fs-6 text-secondary">%</span>');
                
                if (charIndex >= targetText.length) {
                    endGameSession();
                }
            }
        });
    })();
</script>
