<style>
    .arena-wrapper { padding: 30px; max-width: 1000px; margin: 0 auto; }
    
    .hud-panel {
        background: #1e293b;
        border-radius: 15px;
        padding: 20px;
        margin-bottom: 30px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        border: 1px solid #334155;
    }
    
    .hud-value {
        font-family: 'Orbitron', sans-serif;
        font-size: 2.5rem;
        font-weight: bold;
    }

    #textContainer {
        font-size: 1.8rem;
        line-height: 1.8;
        letter-spacing: 1px;
        user-select: none;
        background: #0f172a;
        padding: 40px;
        border-radius: 15px;
        border: 2px solid #334155;
        margin-bottom: 20px;
        color: #64748b;
        position: relative;
    }

    /* Kursor berkedip gaya terminal */
    .active-char {
        border-bottom: 4px solid #3b82f6;
        color: #fff !important;
        text-shadow: 0 0 10px #3b82f6;
    }
    .correct-char { color: #10b981 !important; text-shadow: 0 0 5px rgba(16,185,129,0.5); }
    .wrong-char { color: #ef4444 !important; background-color: rgba(239,68,68,0.2); border-radius: 3px; }

    /* Input text tersembunyi */
    #hiddenInput {
        position: absolute;
        opacity: 0;
        z-index: -100;
    }
</style>

<div class="arena-wrapper">
    <div class="d-flex justify-content-between mb-4">
        <button class="btn btn-outline-secondary rounded-pill" onclick="loadPage('Dashboard')">
            <i class="fas fa-arrow-left me-2"></i> ABORT MISSION
        </button>
        <span class="badge bg-primary fs-6 d-flex align-items-center rounded-pill px-4">
            MODE: TRAINING
        </span>
    </div>

    <div class="hud-panel row text-center align-items-center">
        <div class="col-4 border-end border-secondary">
            <div class="text-secondary fw-bold mb-1">SPEED (WPM)</div>
            <div class="hud-value text-info" id="liveWpm">0</div>
        </div>
        <div class="col-4 border-end border-secondary">
            <div class="text-secondary fw-bold mb-1">ACCURACY</div>
            <div class="hud-value text-success" id="liveAcc">100%</div>
        </div>
        <div class="col-4">
            <div class="text-secondary fw-bold mb-1">TIME LEFT</div>
            <div class="hud-value text-warning" id="liveTimer">60s</div>
        </div>
    </div>

    <div id="textContainer">
        <div class="text-center py-4">
            <div class="spinner-border text-primary" role="status"></div>
            <h5 class="mt-3">MENDOWNLOAD DATA DARI SERVER...</h5>
        </div>
    </div>

    <input type="text" id="hiddenInput" autocomplete="off">
    
    <div class="text-center mt-4 text-secondary small">
        <i class="fas fa-keyboard me-2"></i> Mulai mengetik untuk mengaktifkan timer.
    </div>
</div>

<script>
    let targetText = "";
    let timeRemaining = 60;
    let timerInterval = null;
    let isPlaying = false;
    let charIndex = 0;
    let kesalahan = 0;

    $(document).ready(function() {
        // Meminta kalimat random ke Backend
        google.script.run
            .withSuccessHandler(function(kalimat) {
                targetText = kalimat;
                renderText();
                $('#hiddenInput').focus();
            })
            .withFailureHandler(function() {
                targetText = "Terjadi kesalahan koneksi. Silakan kembali ke menu utama.";
                renderText();
            })
            .getKalimatAcak();

        // Agar setiap kali area di-klik, input tetap fokus
        $(document).on('click', function() {
            $('#hiddenInput').focus();
        });

        // Mesin Utama Pengetikan
        $('#hiddenInput').on('input', function() {
            let typedVal = $(this).val();
            
            // Start Timer jika huruf pertama diketik
            if(!isPlaying && typedVal.length > 0) {
                isPlaying = true;
                startTimer();
            }

            charIndex = typedVal.length;
            kesalahan = 0;

            // Pengecekan per huruf
            for(let i = 0; i < targetText.length; i++) {
                let charSpan = $(`#char-${i}`);
                charSpan.removeClass('correct-char wrong-char active-char');

                if (i < charIndex) {
                    if (typedVal[i] === targetText[i]) {
                        charSpan.addClass('correct-char');
                    } else {
                        charSpan.addClass('wrong-char');
                        kesalahan++;
                    }
                } else if (i === charIndex) {
                    // Posisi kursor saat ini
                    charSpan.addClass('active-char');
                }
            }

            updateHUD();

            // Jika selesai sampai ujung
            if(charIndex >= targetText.length) {
                endGame();
            }
        });
    });

    function renderText() {
        let html = "";
        for(let i = 0; i < targetText.length; i++) {
            html += `<span id="char-${i}">${targetText[i]}</span>`;
        }
        $('#textContainer').html(html);
        $('#char-0').addClass('active-char'); // Set kursor pertama
    }

    function startTimer() {
        let waktuBerjalan = 0;
        timerInterval = setInterval(() => {
            timeRemaining--;
            waktuBerjalan++;
            $('#liveTimer').text(timeRemaining + 's');
            
            updateHUD(waktuBerjalan);

            if(timeRemaining <= 0) {
                endGame();
            }
        }, 1000);
    }

    function updateHUD(waktuBerjalan = 0) {
        // Kalkulasi Akurasi
        if (charIndex > 0) {
            let akurasi = Math.max(0, Math.round(((charIndex - kesalahan) / charIndex) * 100));
            $('#liveAcc').text(akurasi + '%');
        }

        // Kalkulasi WPM
        if (waktuBerjalan > 0) {
            let menit = waktuBerjalan / 60;
            let kataBenar = (charIndex - kesalahan) / 5;
            let wpm = Math.max(0, Math.round(kataBenar / menit));
            $('#liveWpm').text(wpm);
        }
    }

    function endGame() {
        clearInterval(timerInterval);
        $('#hiddenInput').attr('disabled', true);
        
        let finalWpm = parseInt($('#liveWpm').text()) || 0;
        let finalAccText = $('#liveAcc').text();
        let finalAcc = parseInt(finalAccText.replace('%', '')) || 0;
        
        let kdUser = localStorage.getItem('kd_user');
        let durasiRiil = 60 - timeRemaining; 

        // Tampilkan loading screen saat menyimpan data
        Swal.fire({
            title: 'TRANSMITTING DATA...',
            html: 'Menyinkronkan skor ke server utama.',
            background: '#1e293b',
            color: '#3b82f6',
            allowOutsideClick: false,
            didOpen: () => { Swal.showLoading(); }
        });

        // Tembak data ke Code.gs (simpanSkorPemain)
        google.script.run
            .withSuccessHandler(function(response) {
                Swal.fire({
                    icon: 'success',
                    title: 'MISSION COMPLETE!',
                    html: `<div class="fs-4 text-info mt-2 mb-2">SPEED: <b>${finalWpm} WPM</b></div>
                           <div class="fs-4 text-success mb-3">ACCURACY: <b>${finalAcc}%</b></div>`,
                    background: '#1e293b',
                    color: '#fff',
                    confirmButtonText: 'KEMBALI KE BASE',
                    confirmButtonColor: '#3b82f6',
                    allowOutsideClick: false
                }).then(() => {
                    loadPage('Dashboard');
                });
            })
            .withFailureHandler(function(err) {
                Swal.fire('TRANSMISI GAGAL', 'Sistem gagal menyimpan skor: ' + err.message, 'error').then(() => {
                    loadPage('Dashboard');
                });
            })
            .simpanSkorPemain(kdUser, finalWpm, finalAcc, kesalahan, targetText.length, durasiRiil);
    }
</script>
