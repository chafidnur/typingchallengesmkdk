<style>
    /* Styling Arena Mengetik Premium Glassmorphism */
    .typing-wrapper {
        padding: 40px 20px;
        max-width: 900px;
        margin: 0 auto;
        min-height: 100vh;
        color: #fff;
    }
    .game-card {
        background: rgba(30, 41, 59, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .word-box {
        background: rgba(15, 23, 42, 0.6);
        border: 2px solid rgba(255, 255, 255, 0.05);
        border-radius: 15px;
        padding: 25px;
        font-size: 1.5rem;
        line-height: 2.3rem;
        letter-spacing: 1px;
        min-height: 120px;
        margin-bottom: 25px;
        user-select: none;
        text-align: justify;
    }
    /* Indikator Huruf saat diketik */
    .char-current {
        background-color: rgba(59, 130, 246, 0.3);
        border-bottom: 3px solid #3b82f6;
        color: #fff;
    }
    .char-correct { color: #10b981; }
    .char-incorrect { background-color: rgba(239, 68, 68, 0.3); color: #ef4444; border-radius: 4px; }

    .input-typing {
        width: 100%;
        background: rgba(15, 23, 42, 0.8);
        border: 2px solid #334155;
        border-radius: 12px;
        padding: 15px;
        color: #fff;
        font-size: 1.2rem;
        outline: none;
        font-family: 'Orbitron', sans-serif;
        letter-spacing: 1px;
        text-align: center;
    }
    .input-typing:focus {
        border-color: #3b82f6;
        box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
    }
    
    .live-stat {
        font-family: 'Orbitron', sans-serif;
        font-size: 1.8rem;
        font-weight: 700;
    }
</style>

<div class="typing-wrapper">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-0" style="font-family: 'Orbitron', sans-serif; letter-spacing: 2px;">
                <i class="fas fa-keyboard text-info me-2"></i> TRAINING ARENA
            </h2>
            <p class="text-secondary mb-0">Asah kecepatan mengetik 10 jarimu</p>
        </div>
        <div class="d-flex">
            <button class="btn btn-outline-info rounded-pill fw-bold px-3 me-2" id="btnToggleSound" onclick="toggleSound()">
                <i class="fas fa-volume-up me-2"></i> SOUND ON
            </button>
            <button class="btn btn-outline-secondary rounded-pill fw-bold px-3" onclick="loadPage('Dashboard')">
                <i class="fas fa-arrow-left me-2"></i> KEMBALI
            </button>
        </div>
    </div>

    <div class="row g-3 mb-4 text-center">
        <div class="col-4">
            <div class="bg-dark rgba-30 border border-secondary rounded-3 p-3">
                <div class="text-secondary small fw-bold">WAKTU</div>
                <div class="live-stat text-warning" id="liveTimer">60<span class="fs-6 text-secondary">s</span></div>
            </div>
        </div>
        <div class="col-4">
            <div class="bg-dark rgba-30 border border-secondary rounded-3 p-3">
                <div class="text-secondary small fw-bold">SPEED</div>
                <div class="live-stat text-info" id="liveWpm">0 <span class="fs-6 text-secondary">WPM</span></div>
            </div>
        </div>
        <div class="col-4">
            <div class="bg-dark rgba-30 border border-secondary rounded-3 p-3">
                <div class="text-secondary small fw-bold">AKURASI</div>
                <div class="live-stat text-success" id="liveAcc">100<span class="fs-6 text-secondary">%</span></div>
            </div>
        </div>
    </div>

    <div class="game-card">
        <div class="word-box" id="wordBoxContainer">
            </div>

        <input type="text" id="inputTypingField" class="input-typing" placeholder="Klik di sini dan mulai mengetik untuk menjalankan waktu..." autocomplete="off">
    </div>
</div>

<script>
    // ==========================================
    // DEKLARASI VARIABEL GLOBAL (ANTI SPA-RESET)
    // ==========================================
    var targetText = "Teknologi kecerdasan buatan berkembang sangat pesat di era digital abad dua puluh satu ini. Siswa SMK Duta Karya Kudus harus terus belajar koding dan mengasah kompetensi multimedia secara disiplin demi masa depan yang gemilang.";
    var timeRemaining = 60;
    var timerInterval = null;
    var isPlaying = false;
    var charIndex = 0;
    var kesalahan = 0;

    // AUDIO CONFIGURATION (Gaya 10FastFingers Mekanik)
    var isSoundEnabled = true;
    var soundClick = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3'); 
    var soundError = new Audio('https://assets.mixkit.co/active_storage/sfx/2570/2570-preview.mp3'); 

    // Volume Adjustment agar nyaman didengar siswa
    soundClick.volume = 0.6;
    soundError.volume = 0.4;

    // ==========================================
    // FITUR UTUH: SISTEM AUDIO ENGINE
    // ==========================================
    function toggleSound() {
        isSoundEnabled = !isSoundEnabled;
        let btn = document.getElementById('btnToggleSound');
        if(isSoundEnabled) {
            btn.innerHTML = '<i class="fas fa-volume-up me-2"></i> SOUND ON';
            btn.classList.replace('btn-outline-secondary', 'btn-outline-info');
        } else {
            btn.innerHTML = '<i class="fas fa-volume-mute me-2"></i> SOUND OFF';
            btn.classList.replace('btn-outline-info', 'btn-outline-secondary');
        }
    }

    function playTypeSound(isTypo = false) {
        if (!isSoundEnabled) return;
        
        if (isTypo) {
            soundError.currentTime = 0; // Reset ke detik awal (Zero Latency)
            soundError.play().catch(e => {});
        } else {
            soundClick.currentTime = 0; // Reset ke detik awal (Zero Latency)
            soundClick.play().catch(e => {});
        }
    }

    // ==========================================
    // LOGIKA PERMAINAN (GAME ENGINE)
    // ==========================================
    function renderTeksMulai() {
        let container = $('#wordBoxContainer');
        container.empty();
        
        // Memecah teks menjadi span per karakter agar bisa diwarnai satu per satu
        targetText.split('').forEach((char, index) => {
            let span = $('<span>').text(char);
            if(index === 0) span.addClass('char-current');
            container.append(span);
        });
    }

    function startTimer() {
        isPlaying = true;
        timerInterval = setInterval(function() {
            timeRemaining--;
            $('#liveTimer').html(timeRemaining + '<span class="fs-6 text-secondary">s</span>');
            
            // Hitung WPM Live secara berkala
            hitungWpmLive();

            if (timeRemaining <= 0) {
                endGameSession();
            }
        }, 1000);
    }

    function hitungWpmLive() {
        let waktuBerjalan = 60 - timeRemaining;
        if(waktuBerjalan <= 0) return;
        
        // Rumus WPM standar dunia: (Total Karakter Benar / 5) / (Waktu Berjalan / 60)
        let totalKarakterBenar = charIndex - kesalahan;
        if (totalKarakterBenar < 0) totalKarakterBenar = 0;
        let wpm = Math.round((totalKarakterBenar / 5) / (waktuBerjalan / 60));
        $('#liveWpm').html(wpm + ' <span class="fs-6 text-secondary">WPM</span>');
    }

    function endGameSession() {
        clearInterval(timerInterval);
        $('#inputTypingField').prop('disabled', true);
        
        // Hitung hasil final
        let akurasiFinal = Math.round(((targetText.length - kesalahan) / targetText.length) * 100);
        if(akurasiFinal < 0) akurasiFinal = 0;
        
        let totalKarakterBenar = charIndex - kesalahan;
        let wpmFinal = Math.round((totalKarakterBenar / 5) / (1)); // Berdasarkan 1 menit penuh

        Swal.fire({
            title: 'WAKTU HABIS!',
            html: `Sesi latihan Anda selesai.<br><br><b>Kecepatan:</b> ${wpmFinal} WPM<br><b>Akurasi:</b> ${akurasiFinal}%`,
            icon: 'success',
            background: '#1e293b',
            color: '#fff',
            confirmButtonColor: '#3b82f6',
            confirmButtonText: 'LIHAT DASHBOARD'
        }).then(() => {
            loadPage('Dashboard');
        });
    }

    // INTERAKSI INPUT KEYBOARD REALTIME
    (function initGameArena() {
        // Render teks target di awal layar
        renderTeksMulai();

        // Listener saat kolom input diketik siswa
        $('#inputTypingField').on('input', function() {
            let userInputValue = $(this).val();
            let allSpans = $('#wordBoxContainer span');
            
            // Jalankan timer di ketukan pertama siswa
            if (!isPlaying && userInputValue.length > 0) {
                startTimer();
            }

            let lastCharInput = userInputValue.charAt(userInputValue.length - 1);
            let targetChar = targetText.charAt(charIndex);

            // Kondisi 1: Jika ketikan siswa BENAR
            if (lastCharInput === targetChar) {
                $(allSpans[charIndex]).removeClass('char-current char-incorrect').addClass('char-correct');
                playTypeSound(false); // MAIN KAN SUARA MEKANIK
                charIndex++;
            } 
            // Kondisi 2: Jika ketikan siswa SALAH (TYPO)
            else {
                $(allSpans[charIndex]).addClass('char-incorrect');
                playTypeSound(true); // MAIN KAN SUARA ERROR BEEP
                kesalahan++;
            }

            // Geser kursor indikator bawah ke huruf berikutnya
            $(allSpans[charIndex]).addClass('char-current');
            
            // Bersihkan input field secara berkala agar siswa tidak terganggu ketikan lama
            $(this).val('');

            // Hitung Akurasi Live
            let liveAcc = Math.round(((charIndex - kesalahan) / (charIndex || 1)) * 100);
            if(liveAcc < 0) liveAcc = 0;
            $('#liveAcc').html(liveAcc + '<span class="fs-6 text-secondary">%</span>');

            // Jika teks kalimat sudah habis diketik sebelum 60 detik selesai
            if (charIndex >= targetText.length) {
                endGameSession();
            }
        });
    })();
</script>
