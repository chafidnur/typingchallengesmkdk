<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@300;400;500;600&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

.gamified-login-wrapper{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    overflow:hidden;

    background:
        radial-gradient(circle at top left,#1e3a8a 0%,transparent 35%),
        radial-gradient(circle at bottom right,#6d28d9 0%,transparent 35%),
        #020617;
}

/* GRID EFFECT */

.gamified-login-wrapper::before{
    content:'';
    position:absolute;
    inset:0;

    background-image:
        linear-gradient(rgba(59,130,246,.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,.08) 1px, transparent 1px);

    background-size:40px 40px;
}

/* SCANLINE EFFECT */

.gamified-login-wrapper::after{
    content:'';
    position:absolute;
    inset:0;

    background:
        repeating-linear-gradient(
            0deg,
            transparent,
            transparent 2px,
            rgba(255,255,255,.015) 3px
        );

    pointer-events:none;
}

/* FLOATING LIGHTS */

.orb{
    position:absolute;
    border-radius:50%;
    filter:blur(90px);
    opacity:.5;
}

.orb-1{
    width:350px;
    height:350px;
    background:#3b82f6;
    top:-100px;
    left:-100px;
}

.orb-2{
    width:350px;
    height:350px;
    background:#8b5cf6;
    bottom:-100px;
    right:-100px;
}

.orb-3{
    width:250px;
    height:250px;
    background:#06b6d4;
    top:40%;
    left:60%;
}

/* CARD */

.glass-card{
    width:100%;
    max-width:460px;

    background:rgba(15,23,42,.75);

    backdrop-filter:blur(25px);
    -webkit-backdrop-filter:blur(25px);

    border:1px solid rgba(59,130,246,.25);

    border-radius:30px;

    padding:40px;

    position:relative;
    z-index:10;

    box-shadow:
        0 0 30px rgba(59,130,246,.15),
        0 0 80px rgba(139,92,246,.15);
}

.glass-card::before{
    content:'';

    position:absolute;
    inset:0;

    border-radius:30px;

    background:
        linear-gradient(
            135deg,
            rgba(255,255,255,.05),
            transparent,
            rgba(255,255,255,.03)
        );

    pointer-events:none;
}

/* LOGO */

.mascot-ring{
    width:130px;
    height:130px;

    margin:auto;

    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    background:
        linear-gradient(
            135deg,
            #06b6d4,
            #3b82f6,
            #8b5cf6
        );

    box-shadow:
        0 0 20px #3b82f6,
        0 0 50px #8b5cf6;

    position:relative;
}

.mascot-inner{
    width:118px;
    height:118px;

    border-radius:50%;

    background:#0f172a;

    display:flex;
    align-items:center;
    justify-content:center;
}

.mascot-inner i{
    font-size:3rem;
    color:#38bdf8;
}

.developer-tag{
    position:absolute;
    bottom:-12px;
    left:50%;
    transform:translateX(-50%);

    background:#fbbf24;
    color:#000;

    padding:4px 14px;

    border-radius:50px;

    font-size:.7rem;
    font-weight:700;
    white-space:nowrap;
}

/* TITLE */

.game-title{
    margin-top:30px;

    text-align:center;

    font-family:'Orbitron',sans-serif;

    color:white;

    font-size:2rem;

    letter-spacing:4px;
}

.game-subtitle{
    text-align:center;
    color:#94a3b8;
    margin-top:8px;
}

.server-status{
    margin:20px auto 30px;
    width:max-content;

    padding:8px 18px;

    border-radius:999px;

    border:1px solid rgba(34,197,94,.4);

    background:rgba(34,197,94,.08);

    color:#4ade80;

    font-size:.8rem;

    letter-spacing:2px;
}

/* INPUT */

.custom-input-group{
    position:relative;
    margin-bottom:20px;
}

.custom-input-group i{
    position:absolute;
    left:18px;
    top:50%;
    transform:translateY(-50%);
    color:#64748b;
}

.custom-input{
    width:100%;

    padding:15px 15px 15px 50px;

    background:rgba(2,6,23,.8);

    border:1px solid rgba(59,130,246,.2);

    border-radius:14px;

    color:white;

    outline:none;

    transition:.3s;
}

.custom-input:focus{
    border-color:#38bdf8;

    box-shadow:
        0 0 10px rgba(56,189,248,.3),
        0 0 25px rgba(56,189,248,.2);
}

.custom-input::placeholder{
    color:#64748b;
}

/* BUTTON */

.btn-neon{
    width:100%;
    border:none;

    border-radius:14px;

    padding:15px;

    color:white;

    font-weight:700;

    letter-spacing:2px;

    position:relative;

    overflow:hidden;

    background:
        linear-gradient(
            135deg,
            #06b6d4,
            #3b82f6,
            #8b5cf6
        );
}

.btn-neon:hover{
    transform:translateY(-2px);
}

.btn-neon::before{
    content:'';

    position:absolute;

    top:0;
    left:-100%;

    width:100%;
    height:100%;

    background:
        linear-gradient(
            90deg,
            transparent,
            rgba(255,255,255,.3),
            transparent
        );

    transition:.7s;
}

.btn-neon:hover::before{
    left:100%;
}

.btn-neon-gold{
    width:100%;
    margin-top:15px;

    padding:14px;

    border-radius:14px;

    background:transparent;

    color:#fbbf24;

    border:1px solid #fbbf24;
}

.btn-neon-gold:hover{
    background:rgba(251,191,36,.08);
}

.forgot-link{
    color:#94a3b8;
    text-decoration:none;
}

.forgot-link:hover{
    color:#38bdf8;
}
</style>

<div class="gamified-login-wrapper">

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="glass-card">

        <div class="mascot-ring">
            <div class="mascot-inner">
                <i class="fas fa-microchip"></i>
            </div>
            <div class="developer-tag">
                Chafid Nur, S.Kom
            </div>
        </div>

        <h1 class="game-title">
            SMK DUTA KARYA
        </h1>

        <p class="game-subtitle">
            TYPING CHALLENGE V1.0
        </p>

        <div class="server-status">
            ● SERVER ONLINE
        </div>

        <form id="formLogin">

            <div class="custom-input-group">
                <input type="text"
                       id="username"
                       class="custom-input"
                       placeholder="Username"
                       required>
                <i class="fas fa-user"></i>
            </div>

            <div class="custom-input-group">
                <input type="password"
                       id="password"
                       class="custom-input"
                       placeholder="Password"
                       required>
                <i class="fas fa-lock"></i>
            </div>

            <button type="submit"
                    id="btnLogin"
                    class="btn-neon">

                <span id="loginSpinner"
                      class="spinner-border spinner-border-sm d-none me-2">
                </span>

                <span id="btnText">
                    START GAME
                </span>

            </button>

            <button type="button"
                    class="btn-neon-gold"
                    onclick="loadPage('Leaderboard')">

                <i class="fas fa-trophy me-2"></i>
                HALL OF FAME

            </button>

        </form>

        <div class="mt-4 text-center">
            <a href="#"
               id="btnLupaPassword"
               class="forgot-link">

                <i class="fas fa-question-circle"></i>
                Akses Ditolak / Lupa Password?

            </a>
        </div>

    </div>

</div>

<!-- SCRIPT ASLI TIDAK DIUBAH -->

<script>
$(document).ready(function() {
    $('#formLogin').on('submit', function(e) {
        e.preventDefault();

        const username = $('#username').val();
        const password = $('#password').val();

        $('#btnLogin').attr('disabled', true);
        $('#loginSpinner').removeClass('d-none');
        $('#btnText').text('CONNECTING...');

        google.script.run
            .withSuccessHandler(function(response) {

                $('#btnLogin').removeAttr('disabled');
                $('#loginSpinner').addClass('d-none');
                $('#btnText').text('START GAME');

                if (response.status === 'success') {

                    Swal.fire({
                        icon: 'success',
                        title: 'BERHASIL LOGIN',
                        text: 'Welcome Player: ' + response.nama,
                        background: '#1e293b',
                        color: '#fff',
                        showConfirmButton: false,
                        timer: 1500
                    }).then(() => {

                        localStorage.setItem('kd_user', response.kd_user);
                        localStorage.setItem('nama_user', response.nama);
                        localStorage.setItem('role_user', response.role);
                        localStorage.setItem('username_user', username); // Menyimpan teks input username untuk acuan file avatar

                        loadPage('Dashboard');

                    });

                } else {

                    Swal.fire({
                        icon: 'error',
                        title: 'ACCESS DENIED',
                        text: response.message,
                        background: '#1e293b',
                        color: '#fff',
                        confirmButtonColor: '#ef4444'
                    });

                }
            })
            .withFailureHandler(function(err) {

                $('#btnLogin').removeAttr('disabled');
                $('#loginSpinner').addClass('d-none');
                $('#btnText').text('START GAME');

                Swal.fire({
                    icon: 'error',
                    title: 'SERVER ERROR',
                    text: 'Gagal terhubung ke database server.',
                    background: '#1e293b',
                    color: '#fff'
                });

            })
            .prosesLogin(username, password);
    });

    $('#btnLupaPassword').on('click', function(e) {

        e.preventDefault();

        Swal.fire({
            icon: 'info',
            title: 'SISTEM TERKUNCI',
            html: `Tidak bisa masuk? Lupa password?<br><br>Silakan temui <b>Yang Mulia: Chafid Nur, S.Kom.</b> secara langsung untuk melakukan sinkronisasi ulang dan reset password akun Anda.`,
            background: '#1e293b',
            color: '#fff',
            confirmButtonColor: '#3b82f6',
            confirmButtonText: 'MENGERTI'
        });

    });
});
</script>
