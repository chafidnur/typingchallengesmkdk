<style>
    .master-wrapper {
        padding: 40px 20px;
        max-width: 1200px;
        margin: 0 auto;
        min-height: 100vh;
        color: #fff;
    }
    
    .glass-panel {
        background: rgba(30, 41, 59, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 15px;
        padding: 25px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        margin-top: 20px;
    }

    /* Custom Nav Tabs */
    .nav-tabs .nav-link {
        color: #94a3b8;
        border: none;
        border-bottom: 3px solid transparent;
        font-family: 'Orbitron', sans-serif;
        font-weight: 600;
        letter-spacing: 1px;
        transition: all 0.3s;
    }
    .nav-tabs .nav-link:hover { color: #fff; border-color: rgba(59, 130, 246, 0.5); }
    .nav-tabs .nav-link.active {
        color: #3b82f6;
        background: transparent;
        border-bottom: 3px solid #3b82f6;
    }

    /* Custom Table */
    .table-dark-custom {
        color: #e2e8f0;
        border-collapse: separate;
        border-spacing: 0 8px;
    }
    .table-dark-custom thead th {
        border-bottom: none;
        color: #94a3b8;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        padding: 15px;
    }
    .table-dark-custom tbody tr {
        background: rgba(15, 23, 42, 0.6);
        transition: transform 0.2s;
    }
    .table-dark-custom tbody tr:hover {
        transform: scale(1.01);
        background: rgba(59, 130, 246, 0.1);
    }
    .table-dark-custom td {
        border: none;
        padding: 15px;
        vertical-align: middle;
    }
    .table-dark-custom td:first-child { border-top-left-radius: 10px; border-bottom-left-radius: 10px; }
    .table-dark-custom td:last-child { border-top-right-radius: 10px; border-bottom-right-radius: 10px; }

    /* Custom Modal */
    .modal-content.dark-modal {
        background-color: #1e293b;
        border: 1px solid #334155;
        color: white;
    }
    .modal-header { border-bottom: 1px solid #334155; }
    .modal-footer { border-top: 1px solid #334155; }
    .form-control-dark, .form-select-dark {
        background-color: #0f172a;
        border: 1px solid #334155;
        color: white;
    }
    .form-control-dark:focus, .form-select-dark:focus {
        background-color: #0f172a;
        color: white;
        border-color: #3b82f6;
        box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
    }

    /* Box Info Riwayat */
    .info-box {
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 10px;
        padding: 15px;
        text-align: center;
    }
</style>

<div class="master-wrapper">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold" style="font-family: 'Orbitron', sans-serif; letter-spacing: 2px;">
                <i class="fas fa-database text-success me-2"></i> DATA MASTER
            </h2>
            <p class="text-secondary mb-0">Pusat Kendali Data Administrator</p>
        </div>
        <button class="btn btn-outline-secondary rounded-pill fw-bold" onclick="loadPage('Dashboard')">
            <i class="fas fa-arrow-left me-2"></i> KEMBALI
        </button>
    </div>

    <!-- Sistem Tab -->
    <ul class="nav nav-tabs mb-3" id="masterTabs" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-user" type="button" role="tab">Data Pengguna</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-kelas" type="button" role="tab">Data Kelas (V1.2)</button>
        </li>
    </ul>

    <div class="tab-content" id="masterTabsContent">
        <!-- TAB 1: DATA PENGGUNA -->
        <div class="tab-pane fade show active" id="tab-user" role="tabpanel">
            <div class="glass-panel">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="w-50">
                        <input type="text" id="searchSiswa" class="form-control form-control-white rounded-pill" placeholder="Pencarian Nama / NIS / Kelas...">
                    </div>
                    <!-- Tombol Tambah User Tetap Ada -->
                    <button class="btn btn-success rounded-pill fw-bold" data-bs-toggle="modal" data-bs-target="#modalTambahUser">
                        <i class="fas fa-user-plus me-2"></i> TAMBAH USER
                    </button>
                </div>

                <div class="table-responsive">
                    <table class="table table-dark-custom w-100" id="tableSiswa">
                        <thead>
                            <tr>
                                <th>Role</th>
                                <th>NIS/NIP</th>
                                <th>Nama Lengkap</th>
                                <th>Akun Login</th>
                                <th>Status</th>
                                <th class="text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="bodyTableSiswa">
                            <tr>
                                <td colspan="6" class="text-center py-4">
                                    <div class="spinner-border text-primary" role="status"></div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="tab-pane fade" id="tab-kelas" role="tabpanel">
            <div class="glass-panel text-center py-5 text-secondary">
                <i class="fas fa-tools fa-3x mb-3"></i>
                <h4>Fitur Kelola Kelas Sedang Dibangun</h4>
            </div>
        </div>
    </div>
</div>

<!-- MODAL TAMBAH USER (Dengan Input Manual Kode User) -->
<div class="modal fade" id="modalTambahUser" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content dark-modal">
            <div class="modal-header border-secondary">
                <h5 class="modal-title fw-bold" style="font-family: 'Orbitron', sans-serif;">
                    <i class="fas fa-id-card text-success me-2"></i> REGISTRASI PENGGUNA
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="formTambahUser">
                <div class="modal-body row g-3">
                    <div class="col-md-12 mb-2 pb-3 border-bottom border-secondary">
                        <label class="form-label text-warning fw-bold small"><i class="fas fa-key me-1"></i> Kode User (Manual)</label>
                        <input type="text" class="form-control form-control-dark border-warning" id="inKdUser" placeholder="Contoh: USR-001, GURU-01" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label text-secondary small">Nama Lengkap</label>
                        <input type="text" class="form-control form-control-dark" id="inNama" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label text-secondary small">Role</label>
                        <select class="form-select form-select-dark" id="inRole" required>
                            <option value="SISWA">Siswa</option>
                            <option value="GURU">Guru</option>
                            <option value="ADMIN">Admin</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label text-secondary small">Status Aktif</label>
                        <select class="form-select form-select-dark" id="inStatus" required>
                            <option value="1">Aktif</option>
                            <option value="0">Nonaktif</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label text-secondary small">NIS / NIP</label>
                        <input type="text" class="form-control form-control-dark" id="inNis" placeholder="Isi - jika tidak ada">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-warning small fw-bold">Pilih Kelas</label>
                        <select class="form-select form-select-dark border-warning" id="inKelas">
                            <option value="-">-- Pilih Kelas (Pilih ini jika Guru) --</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label text-secondary small">Username Login</label>
                        <input type="text" class="form-control form-control-dark" id="inUsername" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-secondary small">Password</label>
                        <input type="text" class="form-control form-control-dark" id="inPassword" required>
                    </div>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Batal</button>
                    <button type="submit" class="btn btn-success fw-bold" id="btnSimpanUser">
                        <span id="spinSimpan" class="spinner-border spinner-border-sm d-none me-1" role="status"></span>
                        SIMPAN DATA
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- MODAL LIHAT RIWAYAT -->
<div class="modal fade" id="modalRiwayat" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content dark-modal">
            <div class="modal-header border-secondary">
                <h5 class="modal-title fw-bold" style="font-family: 'Orbitron', sans-serif;">
                    <i class="fas fa-history text-info me-2"></i> RIWAYAT LATIHAN USER
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="bodyRiwayat">
                <!-- Konten dinamis riwayat akan masuk ke sini -->
            </div>
            <div class="modal-footer border-secondary">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Tutup</button>
            </div>
        </div>
    </div>
</div>

<script>
// Fungsi untuk membuka Modal Riwayat dan menarik data dari server
    function bukaRiwayat(kdUser) {
        $('#modalRiwayat').modal('show');
        $('#bodyRiwayat').html('<div class="text-center py-5"><div class="spinner-border text-info" role="status"></div><p class="mt-2 text-secondary">Menganalisis rekam jejak...</p></div>');

        google.script.run
            .withSuccessHandler(function(res) {
                // 1. Cek apabila ada error yang dikirim dari Backend
                if(res.status === "error") {
                    $('#bodyRiwayat').html(`<div class="alert alert-danger text-center"><i class="fas fa-exclamation-triangle me-2"></i>${res.message}</div>`);
                    return;
                }

                // 2. Render Info Profil Atas (Jika status Success)
                let html = `
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div>
                            <h4 class="fw-bold mb-0 text-white">${res.detail.nama}</h4>
                            <div class="text-secondary small">NIS: ${res.detail.nis} | Kelas: ${res.detail.kelas}</div>
                        </div>
                        <div class="text-end">
                            <span class="badge bg-primary fs-6 rounded-pill mb-1">Level ${res.detail.level}</span><br>
                            <span class="badge bg-warning text-dark"><i class="fas fa-star me-1"></i>${res.detail.gelar !== '-' ? res.detail.gelar : 'Belum ada gelar'}</span>
                        </div>
                    </div>
                    
                    <div class="row g-3 mb-4">
                        <div class="col-4">
                            <div class="info-box border-info">
                                <div class="text-secondary small">Total Main</div>
                                <h3 class="fw-bold text-info mb-0">${res.total_main} <span class="fs-6">x</span></h3>
                            </div>
                        </div>
                        <div class="col-4">
                            <div class="info-box border-success">
                                <div class="text-secondary small">Top Speed</div>
                                <h3 class="fw-bold text-success mb-0">${res.detail.wpm_terbaik} <span class="fs-6">WPM</span></h3>
                            </div>
                        </div>
                        <div class="col-4">
                            <div class="info-box border-warning">
                                <div class="text-secondary small">Top Acc</div>
                                <h3 class="fw-bold text-warning mb-0">${res.detail.acc_terbaik}%</h3>
                            </div>
                        </div>
                    </div>
                    <h6 class="fw-bold text-secondary mb-3 border-bottom border-secondary pb-2">Log Riwayat Mengetik Terakhir:</h6>
                `;

                // 3. Render Tabel Histori
                if(res.history.length === 0) {
                    html += `<div class="alert alert-dark text-center border-secondary">Siswa ini belum pernah menyelesaikan latihan mengetik.</div>`;
                } else {
                    html += `
                        <div class="table-responsive" style="max-height: 250px; overflow-y: auto;">
                            <table class="table table-dark table-sm table-hover text-center">
                                <thead style="position: sticky; top: 0; background: #1e293b;">
                                    <tr>
                                        <th>Waktu</th>
                                        <th>WPM</th>
                                        <th>Akurasi</th>
                                        <th>Kesalahan</th>
                                        <th>Durasi</th>
                                    </tr>
                                </thead>
                                <tbody>
                    `;
                    res.history.forEach(h => {
                        // Pengamanan agar tanggal tidak error jika isian kosong
                        let tglFormat = "-";
                        let dateObj = new Date(h.tanggal);
                        if (!isNaN(dateObj.getTime())) {
                            tglFormat = dateObj.toLocaleDateString('id-ID') + ' ' + dateObj.toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'});
                        }

                        html += `
                                    <tr>
                                        <td class="text-secondary small">${tglFormat}</td>
                                        <td class="text-info fw-bold">${h.wpm}</td>
                                        <td class="text-success">${h.acc}%</td>
                                        <td class="text-danger">${h.salah}</td>
                                        <td class="text-warning">${h.durasi}s</td>
                                    </tr>
                        `;
                    });
                    html += `</tbody></table></div>`;
                }
                
                $('#bodyRiwayat').html(html);
            })
            .withFailureHandler(function(err) {
                // Ini jika koneksi ke Google terputus
                $('#bodyRiwayat').html(`<div class="alert alert-danger text-center"><i class="fas fa-wifi me-2"></i>Gagal menarik data riwayat: ${err.message}</div>`);
            })
            .getRiwayatSiswa(kdUser);
    }

    $(document).ready(function() {
        // 1. Fungsi Memuat Data Tabel
        function muatTabelSiswa() {
            // Fungsi Memuat Dropdown Kelas Otomatis
            function muatDropdownKelas() {
                $('#inKelas').html('<option value="-">Memuat data kelas...</option>');
                google.script.run
                    .withSuccessHandler(function(data) {
                        let html = '<option value="-">-- Pilih Kelas (Pilih ini jika Guru) --</option>';
                        data.forEach(k => {
                            html += `<option value="${k.kd_kelas}">${k.nama_kelas}</option>`;
                        });
                        $('#inKelas').html(html);
                    })
                    .withFailureHandler(function(err) {
                        $('#inKelas').html('<option value="-">Gagal memuat kelas</option>');
                    })
                    .getListKelasAktif();
            }

            // Panggil fungsinya agar langsung berjalan saat menu Master Data dibuka
            muatDropdownKelas();

            google.script.run
                .withSuccessHandler(function(data) {
                    let html = '';
                    if(data.length === 0) {
                        html = '<tr><td colspan="6" class="text-center text-secondary py-4">Belum ada data pengguna.</td></tr>';
                    } else {
                        data.forEach(s => {
                            let statusBadge = (s.status == 1 || s.status == '1') ? '<span class="badge bg-success">Aktif</span>' : '<span class="badge bg-danger">Nonaktif</span>';
                            let roleBadge = s.role === 'SISWA' ? '<span class="badge bg-primary">SISWA</span>' : `<span class="badge bg-warning text-dark">${s.role}</span>`;
                            
                            html += `
                                <tr class="baris-siswa">
                                    <td>${roleBadge}</td>
                                    <td class="kolom-pencarian fw-bold text-info">${s.nis}</td>
                                    <td class="kolom-pencarian">
                                        <div class="fw-bold">${s.nama}</div>
                                        <div class="small text-secondary">Kls: ${s.kelas}</div>
                                    </td>
                                    <td>
                                        <div class="small text-secondary"><i class="fas fa-user-ninja me-1"></i> ${s.username}</div>
                                        <div class="small text-secondary"><i class="fas fa-key me-1"></i> ${s.password}</div>
                                    </td>
                                    <td>${statusBadge}</td>
                                    <td class="text-center">
                                        <button class="btn btn-sm btn-outline-info rounded-pill" onclick="bukaRiwayat('${s.kd_user}')" title="Lihat Riwayat">
                                            <i class="fas fa-history me-1"></i> Riwayat
                                        </button>
                                    </td>
                                </tr>
                            `;
                        });
                    }
                    $('#bodyTableSiswa').html(html);
                })
                .getListSiswa();
        }

        muatTabelSiswa();

        // 2. Logika Live Search
        $('#searchSiswa').on('keyup', function() {
            let keyword = $(this).val().toLowerCase();
            $('.baris-siswa').filter(function() {
                $(this).toggle($(this).text().toLowerCase().indexOf(keyword) > -1);
            });
        });

        // 3. Logika Submit Form Tambah User Manual
        $('#formTambahUser').on('submit', function(e) {
            e.preventDefault();
            
            $('#btnSimpanUser').prop('disabled', true);
            $('#spinSimpan').removeClass('d-none');

            let creatorName = localStorage.getItem('nama_user') || 'ADMIN_SISTEM';

            let dataSiswaBaru = {
                kd_user: $('#inKdUser').val(), // Mengambil ID Manual
                nama: $('#inNama').val(),
                role: $('#inRole').val(),
                status_aktif: $('#inStatus').val(),
                nis: $('#inNis').val(),
                fkd_kelas: $('#inKelas').val(),
                username: $('#inUsername').val(),
                password: $('#inPassword').val(),
                created_by: creatorName
            };

            google.script.run
                .withSuccessHandler(function(response) {
                    $('#btnSimpanUser').prop('disabled', false);
                    $('#spinSimpan').addClass('d-none');
                    
                    if(response.status === 'success') {
                        $('#modalTambahUser').modal('hide');
                        $('#formTambahUser')[0].reset();
                        
                        Swal.fire({
                            icon: 'success', title: 'BERHASIL', text: response.message, 
                            background: '#1e293b', color: '#fff', showConfirmButton: false, timer: 1500
                        });
                        
                        $('#bodyTableSiswa').html('<tr><td colspan="6" class="text-center py-4"><div class="spinner-border text-primary" role="status"></div></td></tr>');
                        muatTabelSiswa();
                    } else {
                        Swal.fire({ icon: 'error', title: 'GAGAL', text: response.message, background: '#1e293b', color: '#fff' });
                    }
                })
                .withFailureHandler(function(err) {
                    $('#btnSimpanUser').prop('disabled', false);
                    $('#spinSimpan').addClass('d-none');
                    Swal.fire({ icon: 'error', title: 'SERVER ERROR', text: err.message, background: '#1e293b', color: '#fff' });
                })
                .simpanUserBaru(dataSiswaBaru);
        });
    });
</script>
