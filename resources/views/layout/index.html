    <script>
        function checkDevice() {
            // Deteksi berdasarkan User Agent (Android/iOS) atau ukuran layar (< 768px)
            let isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768;
            
            if (isMobile) {
                document.getElementById('app-content').style.display = 'none';
                document.getElementById('mobileBlocker').classList.remove('d-none');
                document.getElementById('mobileBlocker').classList.add('d-flex');
            } else {
                document.getElementById('app-content').style.display = 'block';
                document.getElementById('mobileBlocker').classList.add('d-none');
                document.getElementById('mobileBlocker').classList.remove('d-flex');
            }
        }

        // Jalankan saat pertama kali dibuka dan saat resize
        checkDevice();
        window.addEventListener('resize', checkDevice);
    </script>
