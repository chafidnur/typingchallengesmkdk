    <script>
        function checkDevice() {
            // Deteksi berdasarkan User Agent (Android/iOS) atau ukuran layar (< 768px)
            let isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768;
            
            if (isMobile) {
                // Sembunyikan aplikasi utama dan tampilkan layar blokir
                document.getElementById('app-content').style.display = 'none';
                document.getElementById('mobileBlocker').classList.remove('d-none');
                document.getElementById('mobileBlocker').classList.add('d-flex');
            } else {
                // Pastikan normal jika dibuka di PC
                document.getElementById('app-content').style.display = 'block';
                document.getElementById('mobileBlocker').classList.add('d-none');
                document.getElementById('mobileBlocker').classList.remove('d-flex');
            }
        }

        // Jalankan saat web pertama kali dibuka
        checkDevice();
        
        // Jalankan saat ukuran jendela browser diubah
        window.addEventListener('resize', checkDevice);
    </script>

    <button id="btnFullscreen" onclick="toggleFullScreen()" title="Layar Penuh"
            style="position: fixed; bottom: 30px; right: 30px; z-index: 9999; 
                   background: rgba(15, 23, 42, 0.8); color: #3b82f6; 
                   border: 2px solid #3b82f6; border-radius: 50%; 
                   width: 55px; height: 55px; cursor: pointer; 
                   display: flex; align-items: center; justify-content: center; 
                   box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); 
                   backdrop-filter: blur(5px); transition: all 0.3s;">
        <i class="fas fa-expand fs-4"></i>
    </button>

    <script>
        // Logika API Layar Penuh HTML5
        function toggleFullScreen() {
            let elem = document.documentElement;
            let iconBtn = $('#btnFullscreen');

            if (!document.fullscreenElement) {
                // Masuk ke Fullscreen
                if (elem.requestFullscreen) {
                    elem.requestFullscreen();
                } else if (elem.webkitRequestFullscreen) { /* Safari */
                    elem.webkitRequestFullscreen();
                } else if (elem.msRequestFullscreen) { /* IE11 */
                    elem.msRequestFullscreen();
                }
                iconBtn.html('<i class="fas fa-compress fs-4"></i>').css({
                    'color': '#ef4444', 
                    'border-color': '#ef4444',
                    'box-shadow': '0 0 20px rgba(239, 68, 68, 0.5)'
                });
            } else {
                // Keluar dari Fullscreen
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) { /* Safari */
                    document.webkitExitFullscreen();
                } else if (document.msExitFullscreen) { /* IE11 */
                    document.msExitFullscreen();
                }
                iconBtn.html('<i class="fas fa-expand fs-4"></i>').css({
                    'color': '#3b82f6', 
                    'border-color': '#3b82f6',
                    'box-shadow': '0 0 20px rgba(59, 130, 246, 0.5)'
                });
            }
        }
    </script>
